  name: devops-ingress-haproxy-host-yellow
  labels:
    app.kubernetes.io/name: devops-ingress-haproxy
spec:
  ingressClassName: haproxy
  rules:
  - host: yellow.devops.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-yellow-clusterip
            port:
              number: 8112