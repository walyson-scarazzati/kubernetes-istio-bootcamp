apiVersion: v1
kind: Service
metadata:
  namespace: devops
  name: devops-stateful-set-clusterip
  labels:
    app.kubernetes.io/name: devops-stateful-set
spec:
  selector:
    app.kubernetes.io/name: devops-stateful-set-pod
  ports:
  - port: 8111
    name: http

---

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: devops-gateway
  namespace: devops
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: api.devops.local
    allowedRoutes:
      namespaces:
        from: Same

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: devops-httproute-stateful-set
  namespace: devops
  labels:
    app.kubernetes.io/name: devops-httproute-stateful-set
spec:
  parentRefs:
  - name: devops-gateway
  hostnames:
  - api.devops.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /devops/blue
    backendRefs:
    - name: devops-stateful-set-clusterip
      port: 8111