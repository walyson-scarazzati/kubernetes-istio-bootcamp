apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: devops-blue-request-mirroring
  namespace: devops
spec:
  parentRefs:
  - name: devops-gateway
    namespace: devops
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /devops/blue
    filters:
    - type: RequestMirror
      requestMirror:
        backendRef:
          name: devops-blue-clusterip-2-0-1
          port: 8111
    backendRefs:
    - name: devops-blue-clusterip-2-0-0
      port: 8111