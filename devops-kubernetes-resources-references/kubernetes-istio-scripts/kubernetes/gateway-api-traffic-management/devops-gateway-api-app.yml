  replicas: 1

---

apiVersion: v1
kind: Service
metadata:
  namespace: devops
  name: devops-blue-clusterip-2-0-0
  labels:
    app.kubernetes.io/name: devops-ingress-blue-2-0-0
spec:
  selector:
    app.kubernetes.io/name: devops-ingress-blue-2-0-0
  ports:
  - port: 8111
    name: http

---

