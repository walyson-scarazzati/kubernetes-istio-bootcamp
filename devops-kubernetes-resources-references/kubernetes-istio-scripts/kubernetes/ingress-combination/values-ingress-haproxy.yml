controller:
  resources:
    limits:
      cpu: 300m
      memory: 400Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 65
  service:
    type: LoadBalancer
  # add below sections for monitoring
  stats:
    enabled: true
    port: 1024
  serviceMonitor:
    enabled: true